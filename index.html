// splits streamed text into complete sentences, holding back a trailing partial
// sentence until either more punctuation arrives or isFinal flushes the remainder.
function splitReadySentences(tail, isFinal) {
  const sentences = [];
  let start = 0;
  for (let i = 0; i < tail.length; i++) {
    const ch = tail[i];
    if (ch === "." || ch === "!" || ch === "?") {
      const next = tail[i + 1];
      const boundary = next === undefined ? isFinal : /\s/.test(next);
      if (boundary) {
        const s = tail.slice(start, i + 1).trim();
        if (s) sentences.push(s);
        start = i + 1;
      }
    }
  }
  if (isFinal && start < tail.length) {
    const rest = tail.slice(start).trim();
    if (rest) sentences.push(rest);
    start = tail.length;
  }
  return { sentences, consumed: start };
}

// while a stream is still arriving, hides a trailing fragment that could be
// the start of the <trade> tag forming character-by-character (e.g. "<", "<tr")
// so it's never flashed into the transcript before the full tag is confirmed.
function trimPotentialTagPrefix(s) {
  const tag = "<trade";
  for (let len = Math.min(tag.length - 1, s.length); len > 0; len--) {
    if (s.slice(-len) === tag.slice(0, len)) return s.slice(0, s.length - len);
  }
  return s;
}

// compares two "YYYY.MM.DD-N" build stamps; returns >0 if a is newer than b, 0 if equal, <0 if older.
// falls back to a plain string compare if either doesn't match the expected shape.
function compareBuildStamps(a, b) {
  const parse = (s) => {
    const m = /^(\d{4}\.\d{2}\.\d{2})-(\d+)$/.exec(s || "");
    return m ? { date: m[1], n: Number(m[2]) } : null;
  };
  const pa = parse(a), pb = parse(b);
  if (!pa || !pb) return a === b ? 0 : a > b ? 1 : -1;
  if (pa.date !== pb.date) return pa.date > pb.date ? 1 : -1;
  return pa.n - pb.n;
}

function nyClock(d) {
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: "America/New_York", hour12: false, weekday: "short", hour: "numeric", minute: "numeric",
  }).formatToParts(d || new Date());
  const map = {};
  parts.forEach((p) => { map[p.type] = p.value; });
  return { hour: Number(map.hour), minute: Number(map.minute), weekday: map.weekday };
}

function isRegularUSHours(d) {
  const { hour, minute, weekday } = nyClock(d);
  const isWeekday = weekday !== "Sat" && weekday !== "Sun";
  const minutesNow = hour * 60 + minute;
  return isWeekday && minutesNow >= 9 * 60 + 30 && minutesNow < 16 * 60;
}

async function fetchViaRelay(targetUrl) {
  const relays = [
    "https://corsproxy.io/?url=" + encodeURIComponent(targetUrl),
    "https://api.allorigins.win/raw?url=" + encodeURIComponent(targetUrl),
  ];
  let lastErr;
  for (const relayUrl of relays) {
    try {
      const res = await fetch(relayUrl);
      if (!res.ok) throw new Error("HTTP " + res.status);
      return await res.json();
    } catch (e) { lastErr = e; }
  }
  throw lastErr || new Error("all relays failed");
}

function resizeImageToDataURL(file, maxDim, quality) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      let { width, height } = img;
      if (width > maxDim && width >= height) { height = Math.round(height * (maxDim / width)); width = maxDim; }
      else if (height > maxDim) { width = Math.round(width * (maxDim / height)); height = maxDim; }
      const canvas = document.createElement("canvas");
      canvas.width = width; canvas.height = height;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, width, height);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL("image/jpeg", quality));
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Couldn't read that image")); };
    img.src = url;
  });
}

function calcPnl(t) {
  const dir = t.direction === "LONG" ? 1 : -1;
  return (Number(t.exit) - Number(t.entry)) * dir * POINT_VALUE[t.instrument] * Number(t.contracts);
}
function calcPoints(t) {
  const dir = t.direction === "LONG" ? 1 : -1;
  return (Number(t.exit) - Number(t.entry)) * dir;
}
function calcR(t) {
  if (t.stop === "" || t.stop == null) return null;
  const riskPts = Math.abs(Number(t.entry) - Number(t.stop));
  if (!riskPts) return null;
  const riskDollars = riskPts * POINT_VALUE[t.instrument] * Number(t.contracts);
  if (!riskDollars) return null;
  return calcPnl(t) / riskDollars;
}
function computeStats(trades) {
  if (!trades.length) return null;
  const pnls = trades.map(calcPnl);
  const net = pnls.reduce((a, b) => a + b, 0);
  const wins = pnls.filter((p) => p > 0);
  const losses = pnls.filter((p) => p < 0);
  const winRate = (wins.length / trades.length) * 100;
  const avgWin = wins.length ? wins.reduce((a, b) => a + b, 0) / wins.length : 0;
  const avgLoss = losses.length ? losses.reduce((a, b) => a + b, 0) / losses.length : 0;
  const grossW = wins.reduce((a, b) => a + b, 0);
  const grossL = Math.abs(losses.reduce((a, b) => a + b, 0));
  const pf = grossL > 0 ? grossW / grossL : grossW > 0 ? Infinity : 0;
  const expectancy = net / trades.length;
  let streak = 0;
  const sorted = [...trades].sort((a, b) => (a.date < b.date ? 1 : -1));
  for (const t of sorted) {
    const p = calcPnl(t);
    if (p === 0) continue;
    if (streak === 0) streak = p > 0 ? 1 : -1;
    else if (streak > 0 && p > 0) streak++;
    else if (streak < 0 && p < 0) streak--;

  const avgR = rValues.length ? rValues.reduce((a, b) => a + b, 0) / rValues.length : null;

}

// ---------- market scanner (model: sweep → CISD → FVG retrace → rejection) ----------
function findSwings(cs, strength) {
  const highs = [], lows = [];
  for (let i = strength; i < cs.length - strength; i++) {
    let isH = true, isL = true;
    for (let j = 1; j <= strength; j++) {
      if (cs[i].h <= cs[i - j].h || cs[i].h < cs[i + j].h) isH = false;
      if (cs[i].l >= cs[i - j].l || cs[i].l > cs[i + j].l) isL = false;
    }
    if (isH) highs.push({ i, price: cs[i].h });
    if (isL) lows.push({ i, price: cs[i].l });
  }
  return { highs, lows };
}
function cisdTargetBear(cs, idx) {
  let j = idx;
  if (cs[j].c <= cs[j].o) j--;
  let start = -1;
  while (j >= 0 && cs[j].c > cs[j].o) { start = j; j--; }
  return start >= 0 ? cs[start].o : cs[idx].l;
}
function cisdTargetBull(cs, idx) {
  let j = idx;
  if (cs[j].c >= cs[j].o) j--;
  let start = -1;
  while (j >= 0 && cs[j].c < cs[j].o) { start = j; j--; }
  return start >= 0 ? cs[start].o : cs[idx].h;
}
function fvgAt(cs, k, dir) {
  if (k < 2) return null;
  if (dir === "bear" && cs[k - 2].l > cs[k].h) return { hi: cs[k - 2].l, lo: cs[k].h };
  if (dir === "bull" && cs[k - 2].h < cs[k].l) return { lo: cs[k - 2].h, hi: cs[k].l };
  return null;
}
function advanceScan(seq, cs, i, swings, emit) {
  const c = cs[i];
  if (!seq) {
    const sweptHigh = swings.highs.filter((s) => s.i < i && c.h > s.price && c.c < s.price).sort((a, b) => b.price - a.price)[0];
    if (sweptHigh) {
      emit("sweep", "bear", sweptHigh.price, i);
      return { dir: "bear", phase: "sweep", level: sweptHigh.price, cisdTarget: cisdTargetBear(cs, i), sweepIdx: i, fvg: null };
    }
    const sweptLow = swings.lows.filter((s) => s.i < i && c.l < s.price && c.c > s.price).sort((a, b) => a.price - b.price)[0];
    if (sweptLow) {
      emit("sweep", "bull", sweptLow.price, i);
      return { dir: "bull", phase: "sweep", level: sweptLow.price, cisdTarget: cisdTargetBull(cs, i), sweepIdx: i, fvg: null };
    }
    return null;
  }
  if (i - seq.sweepIdx > 40) { emit("expired", seq.dir, seq.level, i); return null; }
  if (seq.dir === "bear") {
    if (seq.phase === "sweep") {
      if (c.c > seq.level) { emit("invalidated", "bear", seq.level, i); return null; }
      if (c.c < seq.cisdTarget) {
        let f = null;
        for (let k = i; k > seq.sweepIdx && k >= 2; k--) { const g = fvgAt(cs, k, "bear"); if (g) { f = g; break; } }
        emit("cisd", "bear", c.c, i);
        return { ...seq, phase: "cisd", fvg: f };
      }
      return seq;
    }
    if (seq.phase === "cisd") {
      if (!seq.fvg) {
        const g = fvgAt(cs, i, "bear");
        if (g) return { ...seq, fvg: g };
        if (c.c > seq.level) { emit("invalidated", "bear", seq.level, i); return null; }
        return seq;
      }
      if (c.c > seq.fvg.hi) { emit("invalidated", "bear", seq.fvg.hi, i); return null; }

        if (c.c < seq.fvg.lo) { emit("complete", "bear", seq.fvg.lo, i); return null; }

        return { ...seq, phase: "retrace" };
      }
      return seq;
    }
    if (seq.phase === "retrace") {
      if (c.c > seq.fvg.hi) { emit("invalidated", "bear", seq.fvg.hi, i); return null; }
      if (c.c < seq.fvg.lo) { emit("complete", "bear", seq.fvg.lo, i); return null; }
      return seq;
    }

    if (seq.phase === "sweep") {
      if (c.c < seq.level) { emit("invalidated", "bull", seq.level, i); return null; }
      if (c.c > seq.cisdTarget) {
        let f = null;
        for (let k = i; k > seq.sweepIdx && k >= 2; k--) { const g = fvgAt(cs, k, "bull"); if (g) { f = g; break; } }
        emit("cisd", "bull", c.c, i);
        return { ...seq, phase: "cisd", fvg: f };
      }
      return seq;
    }
    if (seq.phase === "cisd") {
      if (!seq.fvg) {
        const g = fvgAt(cs, i, "bull");
        if (g) return { ...seq, fvg: g };
        if (c.c < seq.level) { emit("invalidated", "bull", seq.level, i); return null; }
        return seq;
      }
      if (c.c < seq.fvg.lo) { emit("invalidated", "bull", seq.fvg.lo, i); return null; }
      if (c.l <= seq.fvg.hi) {
        if (c.c > seq.fvg.hi) { emit("complete", "bull", seq.fvg.hi, i); return null; }
        emit("retrace", "bull", seq.fvg.hi, i);
        return { ...seq, phase: "retrace" };
      }
      return seq;
    }
    if (seq.phase === "retrace") {
      if (c.c < seq.fvg.lo) { emit("invalidated", "bull", seq.fvg.lo, i); return null; }
      if (c.c > seq.fvg.hi) { emit("complete", "bull", seq.fvg.hi, i); return null; }

function chime(n) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let k = 0; k < (n || 1); k++) {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = 880 + k * 220;
      const t0 = ctx.currentTime + k * 0.18;
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.exponentialRampToValueAtTime(0.25, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.5);
      o.start(t0); o.stop(t0 + 0.55);
    }
  } catch (e) {}
}

// ---------- candle chart ----------
function CandleChart({ cs, seq }) {
  const view = cs.slice(-60);
  if (!view.length)
    return (
      <div style={{ height: 180, display: "flex", alignItems: "center", justifyContent: "center", color: C.faint, fontFamily: mono, fontSize: 12 }}>
        Connect the data feed to render the tape
      </div>
    );
  const w = 600, h = 180, pad = 6;
  const min = Math.min(...view.map((c) => c.l)), max = Math.max(...view.map((c) => c.h));
  const range = max - min || 1;
  const bw = (w - pad * 2) / view.length;
  const y = (v) => h - pad - ((v - min) / range) * (h - pad * 2);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: 180, display: "block" }}>
      {seq && seq.fvg && seq.fvg.hi >= min && seq.fvg.lo <= max && (
        <rect x={pad} width={w - pad * 2} y={y(Math.min(seq.fvg.hi, max))} height={Math.max(2, y(Math.max(seq.fvg.lo, min)) - y(Math.min(seq.fvg.hi, max)))} fill="rgba(0,212,255,0.1)" stroke={C.border} />
      )}
      {seq && seq.level >= min && seq.level <= max && (
        <line x1={pad} x2={w - pad} y1={y(seq.level)} y2={y(seq.level)} stroke={C.gold} strokeDasharray="4 4" strokeWidth="1" />
      )}
      {view.map((c, i) => {
        const x = pad + i * bw + bw / 2;
        const up = c.c >= c.o;
        const col = up ? C.green : C.red;
        return (
          <g key={c.t + i}>
            <line x1={x} x2={x} y1={y(c.h)} y2={y(c.l)} stroke={col} strokeWidth="1" />
            <rect x={x - bw * 0.3} y={y(Math.max(c.o, c.c))} width={bw * 0.6} height={Math.max(1, Math.abs(y(c.o) - y(c.c)))} fill={col} />
          </g>
        );
      })}
    </svg>
  );
}

function OdometerChar({ ch }) {
  if (!/[0-9]/.test(ch)) {
    return <span style={{ display: "inline-block" }}>{ch === " " ? " " : ch}</span>;

// ---------- equity curve ----------
function EquityCurve({ trades }) {
  const sorted = [...trades].sort((a, b) => (a.date > b.date ? 1 : a.date < b.date ? -1 : a.id - b.id));
  let run = 0;
  const pts = [0, ...sorted.map((t) => (run += calcPnl(t)))];
  if (pts.length < 2)
    return (
      <div style={{ height: 140, display: "flex", alignItems: "center", justifyContent: "center", color: C.faint, fontFamily: mono, fontSize: 12 }}>
        Log trades to render the equity projection
      </div>
    );
  const w = 600, h = 140, pad = 8;
  const min = Math.min(...pts, 0), max = Math.max(...pts, 0);
  const range = max - min || 1;
  const x = (i) => pad + (i / (pts.length - 1)) * (w - pad * 2);
  const y = (v) => h - pad - ((v - min) / range) * (h - pad * 2);
  const path = pts.map((v, i) => `${i === 0 ? "M" : "L"}${x(i).toFixed(1)},${y(v).toFixed(1)}`).join(" ");
  const last = pts[pts.length - 1];
  const color = last >= 0 ? C.cyan : C.red;
  return <EquityCurveSvg key={path} path={path} w={w} h={h} pad={pad} x={x} y={y} pts={pts} last={last} color={color} />;
}

function EquityCurveSvg({ path, w, h, pad, x, y, pts, last, color }) {
  const pathRef = useRef(null);
  const [pathLen, setPathLen] = useState(0);
  useEffect(() => {
    if (pathRef.current) setPathLen(pathRef.current.getTotalLength());
  }, []);
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{ width: "100%", height: 140, display: "block", overflow: "visible" }}>
      <defs>
        <linearGradient id="eqglow" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={C.cyan} stopOpacity="0.25" />
          <stop offset="100%" stopColor={C.cyan} stopOpacity="0" />
        </linearGradient>
      </defs>
      <line x1={pad} x2={w - pad} y1={y(0)} y2={y(0)} stroke={C.faint} strokeDasharray="3 4" strokeWidth="1" />
      <path d={`${path} L ${x(pts.length - 1)},${h - pad} L ${x(0)},${h - pad} Z`} fill="url(#eqglow)" />
      <path ref={pathRef} d={path} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round"
        style={{
          filter: "drop-shadow(0 0 4px rgba(0,212,255,0.6))",
          strokeDasharray: pathLen || 1,
          strokeDashoffset: pathLen || 1,
          animation: pathLen ? "eqDraw 1.4s cubic-bezier(0.22,1,0.36,1) forwards" : "none",
        }} />
      {pathLen > 0 && [0, 1, 2].map((i) => (
        <circle key={i} r={i === 0 ? 3.5 : 2 - i * 0.4} fill={color} opacity={i === 0 ? 0.95 : 0.35 - i * 0.1}
          style={i === 0 ? { filter: `drop-shadow(0 0 4px ${color})` } : undefined}>
          <animateMotion dur="1.4s" begin={`${i * 0.06}s`} fill="freeze" path={path} calcMode="linear" />
        </circle>
      ))}
      <circle cx={x(pts.length - 1)} cy={y(last)} r="3.5" fill={color} />
    </svg>
  );
}

// ---------- P&L calendar (monthly, day + month totals) ----------
function PnlCalendar({ trades }) {
  const [viewDate, setViewDate] = useState(() => {
    const d = new Date();
    d.setDate(1);
    d.setHours(0, 0, 0, 0);
    return d;
  });

  const byDate = {};
  trades.forEach((t) => { byDate[t.date] = (byDate[t.date] || 0) + calcPnl(t); });

  const year = viewDate.getFullYear(), month = viewDate.getMonth();
  const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
  const pad2 = (n) => String(n).padStart(2, "0");
  const firstDow = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayISO = new Date().toISOString().slice(0, 10);

  const cells = [];
  for (let i = 0; i < firstDow; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);
  while (cells.length % 7 !== 0) cells.push(null);

  let monthTotal = 0, monthDays = 0;
  for (let d = 1; d <= daysInMonth; d++) {
    const iso = `${year}-${pad2(month + 1)}-${pad2(d)}`;
    if (iso in byDate) { monthTotal += byDate[iso]; monthDays++; }
  }

  const navBtn = { background: "rgba(0,212,255,0.1)", color: C.cyan, border: `1px solid ${C.border}`, borderRadius: 4, width: 30, height: 30, cursor: "pointer", fontFamily: mono, fontSize: 13 };

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14, flexWrap: "wrap", gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <button onClick={() => setViewDate(new Date(year, month - 1, 1))} style={navBtn}>◀</button>
          <div style={{ fontFamily: disp, fontSize: 16, fontWeight: 700, letterSpacing: "0.08em", color: C.cyan, minWidth: 170, textAlign: "center" }}>
            {monthNames[month]} {year}
          </div>
          <button onClick={() => setViewDate(new Date(year, month + 1, 1))} style={navBtn}>▶</button>
        </div>
        <div style={{ fontSize: 13, fontWeight: 700, color: monthDays ? pnlColor(monthTotal) : C.faint }}>
          MONTH NET {fmt$(monthTotal)}{monthDays ? ` · ${monthDays} day${monthDays > 1 ? "s" : ""} traded` : ""}
        </div>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6, marginBottom: 6 }}>
        {["SUN", "MON", "TUE", "WED", "THU", "FRI", "SAT"].map((d) => (
          <div key={d} style={{ textAlign: "center", fontSize: 10, letterSpacing: "0.1em", color: C.faint }}>{d}</div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 6 }}>
        {cells.map((d, i) => {
          if (d == null) return <div key={i} />;
          const iso = `${year}-${pad2(month + 1)}-${pad2(d)}`;
          const pnl = byDate[iso];
          const has = iso in byDate;
          const isToday = iso === todayISO;
          return (
            <div key={i} style={{
              minHeight: 76, borderRadius: 6, padding: "8px",
              border: `1px solid ${isToday ? C.borderBright : C.border}`,
              background: has ? (pnl > 0 ? "rgba(47,224,138,0.1)" : pnl < 0 ? "rgba(255,85,102,0.1)" : "rgba(0,212,255,0.08)") : "rgba(255,255,255,0.02)",
              display: "flex", flexDirection: "column", justifyContent: "space-between",
            }}>
              <div style={{ fontSize: 10, color: isToday ? C.cyan : C.faint }}>{d}</div>
              {has && <div style={{ fontSize: 13, fontWeight: 700, color: pnlColor(pnl) }}>{fmt$(pnl)}</div>}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---------- wayfinder mark (astrolabe + north star) ----------
function Reactor({ state, onClick, size = 150, awake, seqPhase, flash }) {
  // while idle (no active voice interaction), let scanner activity drive the ambient pulse:
  // sweep < cisd < retrace speed up progressively, and a completed setup flashes gold.
  const PHASE_SPEED = {
    sweep: { ring: "12s", ring2: "18s", ring3: "8s", pulse: "2.2s" },
    cisd: { ring: "8s", ring2: "12s", ring3: "5s", pulse: "1.6s" },
    retrace: { ring: "5s", ring2: "8s", ring3: "3s", pulse: "1.1s" },
  };
  const scannerMood = state !== "idle" || awake ? null :
    flash ? { core: C.gold, ring: "3s", ring2: "4.5s", ring3: "1.5s", pulse: "0.3s" } :
    seqPhase && PHASE_SPEED[seqPhase] ? { core: C.cyan, ...PHASE_SPEED[seqPhase] } : null;

  const core = awake ? C.gold : scannerMood ? scannerMood.core : state === "listening" ? C.gold : state === "thinking" ? C.cyanDim : C.cyan;
  const ringSpeed = awake ? "5s" : scannerMood ? scannerMood.ring : state === "thinking" ? "3s" : state === "speaking" ? "6s" : state === "listening" ? "8s" : "18s";
  const ring2Speed = awake ? "7s" : scannerMood ? scannerMood.ring2 : state === "thinking" ? "4.5s" : state === "speaking" ? "9s" : state === "listening" ? "12s" : "27s";
  const ring3Speed = awake ? "1.5s" : scannerMood ? scannerMood.ring3 : state === "thinking" ? "2s" : state === "speaking" ? "4s" : state === "listening" ? "5.5s" : "12s";
  const pulse =
    awake ? "pulse 0.3s ease-in-out infinite" :
    scannerMood ? `pulse ${scannerMood.pulse} ease-in-out infinite` :
    state === "listening" ? "pulse 0.8s ease-in-out infinite" :
    state === "speaking" ? "pulse 0.45s ease-in-out infinite" :
    "pulse 3.2s ease-in-out infinite";
  return (
    <button onClick={onClick} aria-label={state === "listening" ? "Stop listening" : "Talk to POLARIS"}
      style={{ background: "transparent", border: "none", cursor: "pointer", position: "relative", width: size, height: size, padding: 0 }}>
      <div style={{
        position: "absolute", top: "50%", left: "50%", transform: "translate(-50%, -50%)",
        width: size * 0.3, height: size * 0.3, borderRadius: "50%",
        background: `radial-gradient(circle, ${core} 0%, transparent 70%)`,
        opacity: 0.5,
        animation: pulse,
      }} />
      <svg viewBox="0 0 200 200" style={{ width: "100%", height: "100%", position: "relative" }}>
        <defs>
          <radialGradient id="wayfinderCore" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stopColor="#ffffff" />
            <stop offset="45%" stopColor={core} />
            <stop offset="100%" stopColor="transparent" />
          </radialGradient>
        </defs>
        {/* astrolabe rings */}
        <ellipse cx="100" cy="100" rx="92" ry="38" fill="none" stroke={C.border} strokeWidth="1" opacity="0.65"
          style={{ animation: `spin ${ringSpeed} linear infinite`, transformOrigin: "100px 100px" }} />
        <ellipse cx="100" cy="100" rx="38" ry="92" fill="none" stroke={C.border} strokeWidth="1" opacity="0.45"
          transform="rotate(28 100 100)"
          style={{ animation: `spinrev ${ring2Speed} linear infinite`, transformOrigin: "100px 100px" }} />
        <circle cx="100" cy="100" r="68" fill="none" stroke={core} strokeWidth="1" strokeDasharray="3 7" opacity="0.4"
          style={{ animation: `spin ${ring3Speed} linear infinite`, transformOrigin: "100px 100px" }} />
        {/* north star core */}
        <path d="M100 58 L105 95 L142 100 L105 105 L100 142 L95 105 L58 100 L95 95 Z" fill="url(#wayfinderCore)"
          style={{ animation: pulse, transformOrigin: "100px 100px", filter: `drop-shadow(0 0 ${size * 0.05}px ${core})` }} />
        <circle cx="100" cy="100" r="6" fill="#fff" style={{ animation: pulse, transformOrigin: "100px 100px" }} />
      </svg>
    </button>
  );
}

  const mood = dayPct == null || !Number.isFinite(dayPct) ? null : dayPct > 0 ? C.green : dayPct < 0 ? C.red : null;

    </div>
  );
}

      const mergedTrades = [...map.values()].sort((a, b) => b.id - a.id);
      persist(mergedTrades);

      const remoteWins = (remote.updatedAt || 0) > lastSyncBlobUpdatedAtRef.current;

Extract every distinct trade visible: date (YYYY-MM-DD), instrument (NQ or MNQ only — infer from context like "NQ", "MNQ", "E-mini Nasdaq", or "Micro Nasdaq"; if genuinely unclear, use null), direction (LONG or SHORT), contracts, entry price, exit price, and stop price if visible.

Respond with ONLY raw JSON, no markdown code fences, no preamble, in exactly this shape:
{"trades":[{"date":"YYYY-MM-DD"|null,"instrument":"NQ"|"MNQ"|null,"direction":"LONG"|"SHORT"|null,"contracts":N|null,"entry":N|null,"exit":N|null,"stop":N|null,"confidence":"high"|"low","notes":"..."}]}

Rules:
- Use null for any field you cannot clearly read. NEVER guess a price — a wrong number silently corrupts his P&L stats, which is worse than leaving it blank for him to fill in by hand.
- If the image isn't a readable trade at all, respond {"trades":[]}.
- If it shows multiple fills that are clearly one position being scaled in or out, combine them into a single trade object using the weighted-average entry/exit, and explain that combination in "notes".
- If it shows multiple genuinely distinct trades, return one object per trade.

      const messages = [{

    ttsQueueRef.current = [];

  // resets the queue for a fresh streamed reply (as opposed to stopSpeaking, which halts and stays idle)
  function resetTtsPipeline() {
    haltAllSpeech();

    streamFinishedRef.current = false;

  function fetchElevenAudio(text) {
    const key = elKeyRef.current.trim();
    const voiceId = elVoiceIdRef.current;
    const controller = new AbortController();
    const promise = (async () => {
      const res = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}?output_format=mp3_44100_128`, {
        method: "POST",
        headers: { "xi-api-key": key, "Content-Type": "application/json" },
        body: JSON.stringify({
          text,
          model_id: "eleven_turbo_v2_5",
          voice_settings: { stability: 0.5, similarity_boost: 0.75 },
        }),
        signal: controller.signal,
      });
      if (!res.ok) throw new Error("tts failed");
      const blob = await res.blob();
      return URL.createObjectURL(blob);
    })();
    return { promise, controller };
  }

  function pumpTtsQueue() {
    if (ttsInterruptedRef.current || ttsPlayingRef.current) return;
    const item = ttsQueueRef.current.shift();
    if (!item) {
      if (streamFinishedRef.current) setVoiceState("idle");
      return;
    }
    ttsPlayingRef.current = true;
    setVoiceState("speaking");
    const advance = () => {
      ttsPlayingRef.current = false;
      if (!ttsInterruptedRef.current) pumpTtsQueue();
    };
    if (item.kind === "device") {
      if (!window.speechSynthesis) { advance(); return; }
      try {
        const u = new SpeechSynthesisUtterance(item.text);
        const all = window.speechSynthesis.getVoices();
        const chosen = all.find((v) => v.voiceURI === voiceURIRef.current) || rankVoices(all)[0] || null;
        if (chosen) u.voice = chosen;
        u.rate = 1.0;
        u.pitch = 1.0;
        u.onend = advance;
        u.onerror = advance;
        window.speechSynthesis.speak(u);
      } catch (e) { advance(); }
    } else {
      item.promise.then((url) => {
        if (ttsInterruptedRef.current) { URL.revokeObjectURL(url); advance(); return; }
        const audio = new Audio(url);
        audioRef.current = audio;
        audio.onended = () => { URL.revokeObjectURL(url); advance(); };
        audio.onerror = () => { URL.revokeObjectURL(url); advance(); };
        audio.play().catch(() => advance());
      }).catch((e) => {
        if (e.name !== "AbortError" && !ttsInterruptedRef.current) {
          setElStatus("ElevenLabs playback failed — using device voice");
          ttsQueueRef.current.unshift({ text: item.text, kind: "device" });
        }
        advance();
      });
    }
  }

  function enqueueSentence(text) {
    const t = (text || "").trim();
    if (!t || !voiceOutRef.current || ttsInterruptedRef.current) return;
    if (engineRef.current === "elevenlabs" && elKeyRef.current.trim() && elVoiceIdRef.current) {
      const { promise, controller } = fetchElevenAudio(t);
      ttsQueueRef.current.push({ text: t, kind: "eleven", promise, controller });
    } else {
      ttsQueueRef.current.push({ text: t, kind: "device" });
    }
    pumpTtsQueue();
  }

  function finishStreamSpeech() {
    streamFinishedRef.current = true;

  function startListening() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { flash("Voice input isn't supported in this browser — type below"); return; }
    try {
      const rec = new SR();
      recogRef.current = rec;
      rec.lang = "en-US";
      rec.interimResults = true;
      rec.continuous = false;
      let finalText = "";
      rec.onresult = (e) => {
        let interimText = "";
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const txt = e.results[i][0].transcript;
          if (e.results[i].isFinal) finalText += txt;
          else interimText += txt;
        }
        setInterim(interimText || finalText);
      };
      rec.onend = () => {
        setInterim("");
        if (finalText.trim()) sendToPolaris(finalText.trim());
        else setVoiceState("idle");
      };
      rec.onerror = () => { setInterim(""); setVoiceState("idle"); flash("Mic error — check microphone permission"); };
      rec.start();
      setVoiceState("listening");
    } catch (e) { flash("Couldn't start the mic"); setVoiceState("idle"); }
  }

  function stopWakeLoop() {
    if (wakeRestartTimerRef.current) { clearTimeout(wakeRestartTimerRef.current); wakeRestartTimerRef.current = null; }
    if (wakeRecogRef.current) {
      try {
        wakeRecogRef.current.onend = null;
        wakeRecogRef.current.onerror = null;
        wakeRecogRef.current.onresult = null;
        wakeRecogRef.current.stop();
      } catch (e) {}
      wakeRecogRef.current = null;
    }
  }

  function scheduleWakeRestart() {
    if (wakeRestartTimerRef.current) return;
    const delay = wakeBackoffRef.current;
    wakeBackoffRef.current = Math.min(delay * 2, 2000);
    wakeRestartTimerRef.current = setTimeout(() => {
      wakeRestartTimerRef.current = null;
      startWakeLoop();
    }, delay);
  }

  function startWakeLoop() {
    if (!earsOnRef.current || !appVisibleRef.current || voiceStateRef.current !== "idle" || wakeRecogRef.current) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) return;
    try {
      const rec = new SR();
      wakeRecogRef.current = rec;
      rec.lang = "en-US";
      rec.continuous = true;
      rec.interimResults = true;
      let followup = false;
      rec.onresult = (e) => {
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (!e.results[i].isFinal) continue;
          const txt = (e.results[i][0].transcript || "").trim();
          if (!txt) continue;
          if (followup) {
            followup = false;
            stopWakeLoop();
            sendToPolaris(txt);
            return;
          }
          const idx = txt.toLowerCase().indexOf("polaris");
          if (idx === -1) continue;
          wakeBackoffRef.current = 300;
          wakeErrorStreakRef.current = { count: 0, since: 0 };
          const after = txt.slice(idx + "polaris".length).replace(/^[\s,.:;!?-]+/, "").trim();
          wakeChime();
          setWakeFlash(true);
          setTimeout(() => setWakeFlash(false), 650);
          if (after) {
            stopWakeLoop();
            sendToPolaris(after);
          } else {
            followup = true;
          }
          return;
        }
      };
      rec.onend = () => {
        wakeRecogRef.current = null;
        if (earsOnRef.current && appVisibleRef.current && voiceStateRef.current === "idle") scheduleWakeRestart();
      };
      rec.onerror = (e) => {
        const now = Date.now();
        const streak = wakeErrorStreakRef.current;
        if (now - streak.since < 5000) streak.count++; else { streak.count = 1; streak.since = now; }
        wakeErrorStreakRef.current = streak;
        if (e.error === "not-allowed" || e.error === "service-not-allowed" || streak.count >= 3) {
          wakeRecogRef.current = null;
          saveEarsOn(false);
          if (!wakeNoticeShownRef.current) {
            wakeNoticeShownRef.current = true;
            flash("Hands-free mode isn't supported here — tap the reactor to talk instead");
          }
        }
      };
      rec.start();
    } catch (e) {
      wakeRecogRef.current = null;
    }
  }

    const rows = [["date", "instrument", "direction", "contracts", "entry", "exit", "stop", "tp", "setup", "points", "pnl", "notes"].join(",")];

  function importJSON(e) {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const incoming = Array.isArray(data) ? data : data.trades;
        if (!Array.isArray(incoming)) throw new Error("bad format");
        const map = new Map(trades.map((t) => [t.id, t]));

        incoming.forEach((t) => {
          if (t && t.id != null && t.entry != null && !map.has(t.id)) { map.set(t.id, t); added++; }
        });
        const merged = [...map.values()].sort((a, b) => b.id - a.id);
        persist(merged);
        flash(added + " trades restored — " + merged.length + " total in the book");
      } catch (err) { flash("Couldn't read that backup file"); }

    }
    const emit = (type, dir, price, i) => {
      const dirWord = dir === "bear" ? "bearish" : "bullish";
      const msgs = {
        sweep: `${dir === "bear" ? "Buy-side" : "Sell-side"} liquidity swept at ${price.toFixed(2)} — watching for a shift in delivery${activeSourceRef.current === "NQ" ? ". Heads up, sir — this feed is running ten to fifteen minutes delayed." : ""}`,

        retrace: `Price retracing into the ${dirWord} imbalance`,
        complete: `SETUP COMPLETE — ${dirWord} model: sweep, shift, and rejection from the imbalance at ${price.toFixed(2)}`,
        invalidated: `${dirWord} sequence invalidated — closed through the level`,
        expired: `${dirWord} sequence expired without completing`,
      };
      addScanEvent({ time: cs[i].t, type, dir, msg: msgs[type] });
      if (!silent && scanningRef.current) {
        if (type === "complete") {
          chime(3);
          speak(`Sir, your setup is complete on ${symbolRef.current}. The ${dirWord} model delivered: sweep, shift, and rejection from the imbalance.`);

        else if (type === "sweep" || type === "cisd" || type === "retrace") { chime(1); speak(msgs[type]); }
      }
    };
    for (let i = startIdx; i < cs.length; i++) {
      seqRef.current = advanceScan(seqRef.current, cs, i, swings, emit);

    setSeqView(seqRef.current);

  async function streamAnthropicChat(key, system, messages, maxTokens, { onDelta, signal } = {}) {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": key,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: maxTokens || 1000,
        system,
        messages,
        stream: true,
      }),
      signal,
    });
    if (!res.ok) {
      const errBody = await res.json().catch(() => null);
      const detail = errBody && errBody.error && errBody.error.message ? errBody.error.message : "HTTP " + res.status;
      throw new Error(detail);
    }
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = "";
    let full = "";
    const processFrame = (frame) => {
      for (const line of frame.split("\n")) {
        if (!line.startsWith("data:")) continue;
        const jsonStr = line.slice(5).trim();
        if (!jsonStr) continue;
        let evt;
        try { evt = JSON.parse(jsonStr); } catch (e) { continue; }
        if (evt.type === "content_block_delta" && evt.delta && evt.delta.type === "text_delta") {
          full += evt.delta.text;
          if (onDelta) onDelta(evt.delta.text, full);
        }
      }
    };
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const frames = buf.split("\n\n");
      buf = frames.pop();
      frames.forEach(processFrame);
    }
    if (buf.trim()) processFrame(buf);
    return full;
  }

      const contracts = Number(raw.contracts);
      const entry = Number(raw.entry);
      const exit = Number(raw.exit);
      const stop = raw.stop === null || raw.stop === undefined || raw.stop === "" ? "" : Number(raw.stop);
      const tp = raw.tp === null || raw.tp === undefined || raw.tp === "" ? "" : Number(raw.tp);
      const setup = SETUPS.includes(raw.setup) ? raw.setup : "Other";
      const date = raw.date && /^\d{4}-\d{2}-\d{2}$/.test(raw.date) ? raw.date : new Date().toISOString().slice(0, 10);
      const notes = typeof raw.notes === "string" ? raw.notes : "";
      const valid = POINT_VALUE[instrument] && (direction === "LONG" || direction === "SHORT") && contracts > 0 && Number.isFinite(entry) && Number.isFinite(exit) && (stop === "" || Number.isFinite(stop)) && (tp === "" || Number.isFinite(tp));
      if (!valid) return { cleanText, trade: null };
      return { cleanText, trade: { date, instrument, direction, contracts, entry, exit, stop, tp, setup, notes, id: Date.now() } };
    } catch (e) {
      return { cleanText, trade: null };
    }
  }

      setMsgContent(visible.trimStart());

            </Panel>

            <Panel>
              <div style={{ fontFamily: disp, fontSize: 16, fontWeight: 700, letterSpacing: "0.12em", color: C.cyan, marginBottom: 4 }}>SETUP SCANNER</div>
              <div style={{ color: C.muted, fontSize: 12, marginBottom: 12, lineHeight: 1.6 }}>
                Your model, encoded: liquidity sweep → change in state of delivery → retrace into the imbalance → rejection. Polaris announces each stage out loud. Scans only while this app is open on screen.
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                <div>
                  <Label>Source</Label>
                  <select value={source} onChange={(e) => setSource(e.target.value)} disabled={scanning} style={{ ...inputStyle, opacity: scanning ? 0.5 : 1 }}>
                    <option value="AUTO">AUTO (currently {activeSource === "QQQ" ? "QQQ" : "NQ futures"})</option>
                    <option value="QQQ">QQQ (real-time, US hours)</option>
                    <option value="NQ">NQ futures (delayed ~10-15 min, 24hr)</option>
                  </select>
                </div>
                <div>
                  <Label>Symbol</Label>
                  <input value={activeSource === "NQ" ? "NQ=F" : symbol} onChange={(e) => setSymbol(e.target.value.toUpperCase())} disabled={scanning || activeSource === "NQ"} style={{ ...inputStyle, opacity: scanning || activeSource === "NQ" ? 0.5 : 1 }} />
                </div>
                <div>
                  <Label>Timeframe</Label>
                  <select value={tf} onChange={(e) => setTf(e.target.value)} disabled={scanning} style={{ ...inputStyle, opacity: scanning ? 0.5 : 1 }}>
                    <option value="1min">1 minute</option>
                    <option value="5min">5 minute</option>
                    <option value="15min">15 minute</option>
                  </select>
                </div>
              </div>
              <button onClick={toggleScan}
                style={{
                  width: "100%", padding: "14px 0", fontFamily: mono, fontWeight: 600, fontSize: 13, letterSpacing: "0.12em", borderRadius: 4, cursor: "pointer",
                  background: scanning ? "rgba(255,85,102,0.15)" : C.cyan,
                  color: scanning ? C.red : "#04121C",
                  border: scanning ? `1px solid ${C.red}` : "none",
                  boxShadow: scanning ? "none" : "0 0 16px rgba(0,212,255,0.35)",
                }}>
                {scanning ? "■ STOP SCANNER" : "▶ START SCANNER"}
              </button>
              {scanning && seqView && (
                <div style={{ marginTop: 10, fontSize: 12, color: C.gold, letterSpacing: "0.06em" }}>
                  ACTIVE SEQUENCE: {seqView.dir.toUpperCase()} · PHASE: {seqView.phase.toUpperCase()} · LEVEL {seqView.level.toFixed(2)}{seqView.fvg ? ` · FVG ${seqView.fvg.lo.toFixed(2)}–${seqView.fvg.hi.toFixed(2)}` : ""}
                </div>
              )}
              {scanning && !seqView && (
                <div style={{ marginTop: 10, fontSize: 12, color: C.muted, animation: "pulse 2s ease-in-out infinite" }}>
                  ◈ Scanning for a sweep of the marked liquidity…
                </div>
              )}
            </Panel>

            {scanEvents.length > 0 && (
              <Panel style={{ maxHeight: 260, overflowY: "auto" }}>
                <Label color={C.cyan}>Scanner feed</Label>
                <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                  {scanEvents.map((e, i) => (
                    <div key={i} style={{ display: "flex", gap: 10, fontSize: 12, alignItems: "baseline" }}>
                      <span style={{ color: C.faint, fontSize: 10, whiteSpace: "nowrap" }}>{e.time.slice(11, 16) || e.time}</span>
                      <span style={{
                        color: e.type === "complete" ? C.gold : e.type === "invalidated" || e.type === "expired" ? C.faint : e.dir === "bear" ? C.red : C.green,
                        fontWeight: e.type === "complete" ? 700 : 400, lineHeight: 1.5,
                      }}>
                        {e.msg}
                      </span>
                    </div>
                  ))}
                </div>
              </Panel>
            )}

            <div style={{ fontSize: 10, color: C.faint, lineHeight: 1.7 }}>
              The scanner detects when your conditions print — it is not a signal service and doesn't judge whether the trade is worth taking. Confirm on your own charts; QQQ levels won't match NQ prices, only the structure.
            </div>
          </React.Fragment>
        )}

        {/* ================= SETUP ================= */}
        {tab === "SETUP" && (
          <React.Fragment>
            <div style={{ textAlign: "right", fontSize: 10, color: C.faint, letterSpacing: "0.1em" }}>
              BUILD {BUILD}
            </div>
            <Panel>
              <div style={{ fontFamily: disp, fontSize: 16, fontWeight: 700, letterSpacing: "0.12em", color: C.cyan, marginBottom: 4 }}>THE BRAIN — ANTHROPIC API</div>
              <div style={{ color: C.muted, fontSize: 12, marginBottom: 12, lineHeight: 1.6 }}>
                Polaris thinks with Claude. Get a key at console.anthropic.com → API Keys (requires API credits, separate from a Claude subscription).
              </div>
              <Label>Anthropic API key</Label>
              <input
                type="password"
                value={anthropicKey}
                onChange={(e) => saveAnthropicKey(e.target.value)}
                placeholder="sk-ant-…"
                style={inputStyle}
              />
              <div style={{ fontSize: 11, marginTop: 8, color: anthropicKey ? C.green : C.gold }}>
                {anthropicKey ? "✓ Key saved — the brain is online" : "No key yet — Polaris can't respond without one"}
              </div>
              <div style={{ fontSize: 10, color: C.faint, marginTop: 10, lineHeight: 1.6 }}>
                Keys below are saved automatically as you type. If they don't survive closing Safari, Private Browsing Mode is almost always the cause — it keeps storage in memory only and wipes it when the tab closes. Turn it off for this site to make keys stick.
              </div>
            </Panel>

            <Panel>
              <div style={{ fontFamily: disp, fontSize: 16, fontWeight: 700, letterSpacing: "0.12em", color: C.cyan, marginBottom: 4 }}>THE FEED — MARKET DATA</div>
              <div style={{ color: C.muted, fontSize: 12, marginBottom: 12, lineHeight: 1.6 }}>
                Powers the MARKET tab and the setup scanner. Free key at twelvedata.com — sign up, and your API key is on the dashboard. Free tier covers US stocks/ETFs like QQQ (the NQ proxy); CME futures data isn't on free plans anywhere.
              </div>
              <Label>Twelve Data API key</Label>
              <input
                type="password"
                value={tdKey}
                onChange={(e) => saveTdKey(e.target.value)}
                placeholder="paste key…"
                style={inputStyle}
              />
              <div style={{ fontSize: 11, marginTop: 8, color: tdKey ? C.green : C.gold }}>
                {tdKey ? "✓ Key saved — the feed is ready" : "No key yet — MARKET tab won't have data"}
              </div>
            </Panel>

            <Panel>
              <div style={{ fontFamily: disp, fontSize: 16, fontWeight: 700, letterSpacing: "0.12em", color: C.cyan, marginBottom: 12 }}>THE VOICE</div>
              <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 11, color: C.muted, cursor: "pointer", marginBottom: 12 }}>
                <input type="checkbox" checked={voiceOut} onChange={(e) => setVoiceOut(e.target.checked)} style={{ accentColor: C.cyan }} />
                SPOKEN REPLIES {voiceOut ? "ON" : "OFF"}
              </label>
              {voiceOut && (
                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  <div>
                    <Label>Voice engine</Label>
                    <div style={{ display: "flex", gap: 6 }}>
                      {[["device", "DEVICE"], ["elevenlabs", "ELEVENLABS"]].map(([val, lbl]) => (
                        <button key={val} onClick={() => { setEngine(val); saveElConfig({ engine: val }); }}
                          style={{ flex: 1, padding: "9px 0", fontFamily: mono, fontSize: 12, fontWeight: 600, letterSpacing: "0.08em", borderRadius: 4, cursor: "pointer",
                            background: engine === val ? "rgba(0,212,255,0.14)" : "transparent",
                            color: engine === val ? C.cyan : C.muted,
                            border: `1px solid ${engine === val ? C.borderBright : C.border}` }}>
                          {lbl}
                        </button>
                      ))}
                    </div>
                  </div>

                  {engine === "device" && voiceList.length > 0 && (
                    <div>
                      <Label>Device voice</Label>
                      <select value={voiceURI} onChange={(e) => pickVoice(e.target.value)} style={inputStyle}>
                        {voiceList.map((v) => (
                          <option key={v.voiceURI} value={v.voiceURI}>{v.name} ({v.lang})</option>
                        ))}
                      </select>
                    </div>
                  )}

                  {engine === "elevenlabs" && (
                    <React.Fragment>
                      <div>
                        <Label>ElevenLabs API key</Label>
                        <div style={{ display: "flex", gap: 8 }}>
                          <input
                            type="password"
                            value={elKey}
                            onChange={(e) => { setElKey(e.target.value); saveElConfig({ key: e.target.value }); }}
                            placeholder="xi-…"
                            style={{ ...inputStyle, flex: 1 }}
                          />
                          <button onClick={loadElVoices}
                            style={{ background: "rgba(0,212,255,0.14)", color: C.cyan, border: `1px solid ${C.borderBright}`, borderRadius: 4, padding: "0 14px", fontFamily: mono, fontWeight: 600, fontSize: 11, cursor: "pointer", whiteSpace: "nowrap" }}>
                            LOAD VOICES
                          </button>
                        </div>
                        {elStatus && <div style={{ fontSize: 11, color: C.gold, marginTop: 6 }}>{elStatus}</div>}
                      </div>
                      {elVoices.length > 0 && (
                        <div>
                          <Label>ElevenLabs voice</Label>
                          <select value={elVoiceId} onChange={(e) => { setElVoiceId(e.target.value); saveElConfig({ voiceId: e.target.value }); }} style={inputStyle}>
                            {elVoices.map((v) => (
                              <option key={v.id} value={v.id}>{v.name}</option>
                            ))}
                          </select>
                        </div>
                      )}
                    </React.Fragment>
                  )}

                  <button
                    onClick={() => speak("Systems online. This is how I'll sound, sir.")}
                    style={{ alignSelf: "flex-start", background: "rgba(0,212,255,0.14)", color: C.cyan, border: `1px solid ${C.borderBright}`, borderRadius: 4, padding: "10px 20px", fontFamily: mono, fontWeight: 600, fontSize: 12, cursor: "pointer" }}
                  >
                    TEST VOICE
                  </button>
                </div>
              )}
            </Panel>

            <Panel>
              <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", flexWrap: "wrap", gap: 8, marginBottom: 4 }}>
                <div style={{ fontFamily: disp, fontSize: 16, fontWeight: 700, letterSpacing: "0.12em", color: C.cyan }}>MEMORY</div>
                <div style={{ fontSize: 10, color: C.faint, letterSpacing: "0.08em" }}>
                  {memory ? memory.trim().split(/\s+/).filter(Boolean).length : 0}/300 WORDS
                </div>
              </div>
              <div style={{ color: C.muted, fontSize: 12, marginBottom: 12, lineHeight: 1.6 }}>
                A running summary of durable facts Polaris carries between sessions — goals, rules, struggles, recurring patterns. Updates quietly in the background after each reply.
              </div>
              {memoryEditing ? (
                <React.Fragment>
                  <textarea rows={7} value={memoryDraft} onChange={(e) => setMemoryDraft(e.target.value)} style={{ ...inputStyle, resize: "vertical" }} />
                  <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                    <button onClick={() => { saveMemory(memoryDraft.trim()); setMemoryEditing(false); flash("Memory saved"); }}
                      style={{ background: C.cyan, color: "#04121C", border: "none", borderRadius: 4, padding: "10px 18px", fontFamily: mono, fontWeight: 600, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer" }}>
                      SAVE
                    </button>
                    <button onClick={() => setMemoryEditing(false)}
                      style={{ background: "transparent", color: C.muted, border: `1px solid ${C.border}`, borderRadius: 4, padding: "10px 18px", fontFamily: mono, fontWeight: 600, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer" }}>
                      CANCEL
                    </button>
                  </div>
                </React.Fragment>
              ) : (
                <React.Fragment>
                  <div style={{ background: "rgba(3,10,20,0.8)", border: `1px solid ${C.border}`, borderRadius: 6, padding: 12, fontSize: 12, lineHeight: 1.7, color: memory ? C.text : C.faint, whiteSpace: "pre-wrap", maxHeight: 180, overflowY: "auto" }}>
                    {memory || "Nothing recorded yet — Polaris starts learning after your first conversation."}
                  </div>
                  <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                    <button onClick={() => { setMemoryDraft(memory); setMemoryEditing(true); }}
                      style={{ background: "rgba(0,212,255,0.14)", color: C.cyan, border: `1px solid ${C.borderBright}`, borderRadius: 4, padding: "10px 18px", fontFamily: mono, fontWeight: 600, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer" }}>
                      EDIT
                    </button>
                    <button onClick={wipeMemory}
                      style={{ background: "transparent", color: C.red, border: `1px solid rgba(255,85,102,0.4)`, borderRadius: 4, padding: "10px 18px", fontFamily: mono, fontWeight: 600, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer" }}>
                      WIPE MEMORY
                    </button>
                    <button onClick={clearChatHistory}
                      style={{ background: "transparent", color: C.muted, border: `1px solid ${C.border}`, borderRadius: 4, padding: "10px 18px", fontFamily: mono, fontWeight: 600, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer" }}>
                      CLEAR CHAT HISTORY
                    </button>
                  </div>
                </React.Fragment>
              )}
            </Panel>

            <Panel>
              <div style={{ fontFamily: disp, fontSize: 16, fontWeight: 700, letterSpacing: "0.12em", color: C.cyan, marginBottom: 4 }}>RULES — THE GUARDIAN</div>
              <div style={{ color: C.muted, fontSize: 12, marginBottom: 4, lineHeight: 1.6 }}>
                Hard limits, checked against today's logged trades — voice-logged trades count too. Breaches never block logging; they just get loud: a red banner, a chime, and one spoken warning per breach.
              </div>
              {[
                { key: "maxTrades", label: "MAX TRADES PER DAY", unit: "", min: 1, step: 1 },
                { key: "maxLoss", label: "MAX DAILY LOSS ($)", unit: "$", min: 1, step: 25 },
                { key: "cooldown", label: "COOLDOWN AFTER A LOSS (MIN)", unit: "", min: 1, step: 5 },
              ].map((r) => (
                <div key={r.key} style={{ display: "flex", alignItems: "center", gap: 14, padding: "12px 0", borderTop: `1px solid ${C.border}`, flexWrap: "wrap" }}>
                  <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: rules[r.key].enabled ? C.text : C.muted, cursor: "pointer", flex: 1, minWidth: 180 }}>
                    <input type="checkbox" checked={rules[r.key].enabled}
                      onChange={(e) => saveRules({ ...rules, [r.key]: { ...rules[r.key], enabled: e.target.checked } })}
                      style={{ accentColor: C.cyan }} />
                    {r.label}
                  </label>
                  <input type="number" min={r.min} step={r.step} value={rules[r.key].value} disabled={!rules[r.key].enabled}
                    onChange={(e) => saveRules({ ...rules, [r.key]: { ...rules[r.key], value: Number(e.target.value) || r.min } })}
                    style={{ ...inputStyle, width: 100, opacity: rules[r.key].enabled ? 1 : 0.5 }} />
                </div>
              ))}
              {breaches.length > 0 && (
                <div style={{ marginTop: 12, fontSize: 11, color: C.red }}>
                  ⛔ {breaches.length} rule{breaches.length > 1 ? "s" : ""} breached today — see the banner above.
                </div>
              )}
            </Panel>

            <Panel>
              <div style={{ fontFamily: disp, fontSize: 16, fontWeight: 700, letterSpacing: "0.12em", color: C.cyan, marginBottom: 4 }}>PRESENCE — SPEAKING UP UNPROMPTED</div>
              <div style={{ color: C.muted, fontSize: 12, marginBottom: 12, lineHeight: 1.6 }}>
                Lets Polaris speak without being asked: session bells, rule pre-warnings, a scanner heartbeat, and P&amp;L milestones. Capped at one proactive line every 10 minutes — rule pre-warnings always get through regardless. No API calls for these lines.
              </div>
              <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: proactiveMode ? C.text : C.muted, cursor: "pointer", padding: "10px 0", borderTop: `1px solid ${C.border}` }}>
                <input type="checkbox" checked={proactiveMode} onChange={(e) => saveProactiveMode(e.target.checked)} style={{ accentColor: C.cyan }} />
                PROACTIVE MODE {proactiveMode ? "ON" : "OFF"}
              </label>
              <div style={{ display: "flex", alignItems: "center", gap: 14, padding: "10px 0", borderTop: `1px solid ${C.border}`, flexWrap: "wrap" }}>
                <label style={{ fontSize: 12, color: C.text, flex: 1, minWidth: 180 }}>P&amp;L MILESTONE THRESHOLD ($)</label>
                <input type="number" min={1} step={50} value={pnlMilestone} disabled={!proactiveMode}
                  onChange={(e) => savePnlMilestone(Number(e.target.value) || 1)}
                  style={{ ...inputStyle, width: 100, opacity: proactiveMode ? 1 : 0.5 }} />
              </div>
            </Panel>

            <Panel>
              <div style={{ fontFamily: disp, fontSize: 16, fontWeight: 700, letterSpacing: "0.12em", color: C.cyan, marginBottom: 4 }}>THE VAULT — BACKUP</div>
              <div style={{ color: C.muted, fontSize: 12, marginBottom: 12, lineHeight: 1.6 }}>
                Your journal lives only in this browser — clearing browser data erases it. Export a backup regularly; restore merges it back in without duplicating trades.
              </div>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                <button onClick={exportJSON}
                  style={{ background: C.cyan, color: "#04121C", border: "none", borderRadius: 4, padding: "12px 18px", fontFamily: mono, fontWeight: 600, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer" }}>
                  EXPORT BACKUP
                </button>
                <button onClick={exportCSV}
                  style={{ background: "rgba(0,212,255,0.14)", color: C.cyan, border: `1px solid ${C.borderBright}`, borderRadius: 4, padding: "12px 18px", fontFamily: mono, fontWeight: 600, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer" }}>
                  EXPORT CSV
                </button>
                <label style={{ background: "rgba(0,212,255,0.14)", color: C.cyan, border: `1px solid ${C.borderBright}`, borderRadius: 4, padding: "12px 18px", fontFamily: mono, fontWeight: 600, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer" }}>
                  RESTORE
                  <input type="file" accept=".json,application/json" onChange={importJSON} style={{ display: "none" }} />
                </label>
              </div>
              <div style={{ fontSize: 11, marginTop: 10, color: trades.length ? C.green : C.gold }}>
                {trades.length ? trades.length + " trades in the book" : "Book is empty — nothing to back up yet"}
              </div>
            </Panel>

            <Panel>
              <div style={{ fontFamily: disp, fontSize: 16, fontWeight: 700, letterSpacing: "0.12em", color: C.cyan, marginBottom: 4 }}>SYNC — CROSS-DEVICE</div>
              <div style={{ color: C.muted, fontSize: 12, marginBottom: 12, lineHeight: 1.6 }}>
                Keeps keys, journal, memory, chat, and rules in sync between devices using a private GitHub Gist you control. Off by default — turning it on means this data leaves the device and lives in your GitHub account.
              </div>
              <div style={{ background: "rgba(245,200,107,0.08)", border: "1px solid rgba(245,200,107,0.3)", borderRadius: 6, padding: 12, marginBottom: 12, fontSize: 11, color: C.gold, lineHeight: 1.6 }}>
                Create a token at github.com/settings/tokens → "Generate new token (classic)" → check ONLY the "gist" scope, nothing else. That limits what a leaked token could ever touch.
              </div>
              <Label>GitHub personal access token</Label>
              <input type="password" value={syncToken} onChange={(e) => setSyncToken(e.target.value)} placeholder="ghp_…" style={inputStyle} />
              <div style={{ marginTop: 10 }}>
                <Label>{gistId ? "Gist ID — copy this into your other device" : "Gist ID (leave blank on your first device)"}</Label>
                <input value={gistIdDraft} onChange={(e) => setGistIdDraft(e.target.value)} onClick={(e) => gistId && e.target.select()}
                  placeholder="paste an existing gist ID to connect a second device" style={{ ...inputStyle, color: gistId ? C.gold : C.text }} />
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap", alignItems: "center" }}>
                {!syncEnabled ? (
                  <button onClick={connectSync} disabled={syncBusy}
                    style={{ background: C.cyan, color: "#04121C", border: "none", borderRadius: 4, padding: "12px 18px", fontFamily: mono, fontWeight: 600, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer" }}>
                    {syncBusy ? "CONNECTING…" : gistId ? "RECONNECT" : "CONNECT SYNC"}
                  </button>
                ) : (
                  <React.Fragment>
                    <button onClick={() => pullAndMergeSync()} disabled={syncBusy}
                      style={{ background: "rgba(0,212,255,0.14)", color: C.cyan, border: `1px solid ${C.borderBright}`, borderRadius: 4, padding: "12px 18px", fontFamily: mono, fontWeight: 600, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer" }}>
                      SYNC NOW
                    </button>
                    <button onClick={disconnectSync}
                      style={{ background: "transparent", color: C.muted, border: `1px solid ${C.border}`, borderRadius: 4, padding: "12px 18px", fontFamily: mono, fontWeight: 600, fontSize: 12, letterSpacing: "0.08em", cursor: "pointer" }}>
                      PAUSE SYNC
                    </button>
                  </React.Fragment>
                )}
              </div>
              {syncStatus && (
                <div style={{ fontSize: 11, marginTop: 10, color: syncStatus.toLowerCase().includes("error") || syncStatus.toLowerCase().includes("failed") ? C.red : C.green }}>
                  {syncStatus}
                </div>
              )}
              <div style={{ fontSize: 11, marginTop: 8, color: syncEnabled ? C.green : C.faint }}>
                {syncEnabled ? "✓ Sync active — auto-syncs a few seconds after any change" : "Sync is off — your data stays local-only"}
              </div>
            </Panel>

            <Panel>
              <div style={{ fontSize: 11, color: C.faint, lineHeight: 1.8 }}>
                Keys and your journal are stored only in this browser on this device — nothing is uploaded anywhere except directly to Anthropic and ElevenLabs when Polaris thinks or speaks, or to your own GitHub Gist if you've turned Sync on above. Don't share this device's browser profile, your keys, or your GitHub token. API and sync usage bills to your own accounts.
              </div>
            </Panel>
          </React.Fragment>
        )}
        </div>

        <div style={{ textAlign: "center", color: C.faint, fontSize: 10, letterSpacing: "0.1em", padding: "6px 0 20px" }}>
          NQ $20/PT · MNQ $2/PT · TICK 0.25 · STANDALONE MODE — DATA SAVED IN THIS BROWSER · BUILD {BUILD}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
